name: Build and Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DEFAULT_APP_DIR: /home/ubuntu/konglamerat

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SPA
        run: pnpm build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.KONGLOMERAT_SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ vars.KONGLOMERAT_SERVER_HOST }}
          SERVER_PORT: ${{ vars.KONGLOMERAT_SERVER_PORT }}
        run: |
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SERVER_HOST"
          SERVER_PORT="${SERVER_PORT:-22}"
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/konglomerat_deploy_key
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/konglomerat_deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload built SPA
        env:
          SERVER_HOST: ${{ vars.KONGLOMERAT_SERVER_HOST }}
          SERVER_USER: ${{ vars.KONGLOMERAT_SERVER_USER }}
          SERVER_PORT: ${{ vars.KONGLOMERAT_SERVER_PORT }}
          APP_DIR: ${{ vars.KONGLOMERAT_APP_DIR }}
        run: |
          SERVER_USER="${SERVER_USER:-ubuntu}"
          SERVER_PORT="${SERVER_PORT:-22}"
          APP_DIR="${APP_DIR:-$DEFAULT_APP_DIR}"
          SSH="ssh -i ~/.ssh/konglomerat_deploy_key -p $SERVER_PORT"

          $SSH "$SERVER_USER@$SERVER_HOST" "mkdir -p '$APP_DIR/frontend/dist' && find '$APP_DIR/frontend/dist' -mindepth 1 -maxdepth 1 -exec rm -rf {} +"
          tar -C dist -czf - . | $SSH "$SERVER_USER@$SERVER_HOST" "tar -xzf - -C '$APP_DIR/frontend/dist'"

      - name: Restart Nginx and smoke test
        env:
          SERVER_HOST: ${{ vars.KONGLOMERAT_SERVER_HOST }}
          SERVER_USER: ${{ vars.KONGLOMERAT_SERVER_USER }}
          SERVER_PORT: ${{ vars.KONGLOMERAT_SERVER_PORT }}
          APP_DIR: ${{ vars.KONGLOMERAT_APP_DIR }}
        run: |
          SERVER_USER="${SERVER_USER:-ubuntu}"
          SERVER_PORT="${SERVER_PORT:-22}"
          APP_DIR="${APP_DIR:-$DEFAULT_APP_DIR}"
          SSH="ssh -i ~/.ssh/konglomerat_deploy_key -p $SERVER_PORT"

          $SSH "$SERVER_USER@$SERVER_HOST" "cd '$APP_DIR' && if [ -f docker-compose.yml ]; then docker compose up -d nginx && docker compose ps nginx; fi"
          for attempt in $(seq 1 30); do
            if curl -fsS "http://$SERVER_HOST/" >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          exit 1
